# Multica.ai connected-agent runtime.
#
#   cp .env.example .env                       # then fill in tokens
#   docker compose up -d --build               # build + start the daemon
#   docker compose logs -f                     # follow daemon output
#   docker compose down                        # stop (named volumes persist)
#   docker compose run --rm runtime bash       # one-off interactive shell
#
# Daemon mode needs MULTICA_TOKEN in .env; without it the entrypoint just opens a
# shell and the container exits.

services:
  runtime:
    build: .
    image: multica-agent-runtime
    # No container_name — let Compose name it project-scoped so it never collides
    # with a manually-run container holding a fixed name.
    env_file:
      - .env
    volumes:
      # Daemon identity + auth + config: persist so reruns reuse the same runtime
      # and skip re-login.
      - multica-state:/home/agent/.multica
      # Repo cache + agent workdirs: persist to skip re-clone and resume tasks.
      # Can grow over time — drop this line if you want a clean slate each run.
      - multica-workspaces:/home/agent/multica_workspaces
      # Optional: mount a local project for agents to work on in place (otherwise
      # the daemon clones repos itself into multica_workspaces per task).
      # - ./your-project:/app
    restart: unless-stopped

volumes:
  multica-state:
  multica-workspaces:
